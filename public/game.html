<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNO — Game</title>
  <link rel="shortcut icon" href="assets/logo_game/UNO_Logo.svg.png" type="image/png"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/game.css"/>
</head>
<body>

  <header class="game-header">
    <img src="assets/logo_game/UNO_Logo.svg.png" alt="UNO" class="game-logo"/>
    <div class="turn-indicator" id="turn-indicator">
      <span class="turn-label">Current turn</span>
      <span class="turn-player" id="turn-player-name">—</span>
    </div>
    <div class="game-meta">
      <span class="deck-count" id="deck-count">🂠 52</span>
      <span class="direction-badge" id="direction-badge">▶ CW</span>
    </div>
  </header>
  <div class="game-table" id="game-table">

    <div class="opponent-zone zone-top" id="zone-top">
      <div class="opponent-info" id="opp-top-info">
        <div class="opp-avatar" id="opp-top-avatar">?</div>
        <span class="opp-name" id="opp-top-name">—</span>
        <span class="opp-card-count" id="opp-top-count">
          <span class="card-icon">🂠</span><span id="opp-top-n">0</span>
        </span>
      </div>
      <div class="opp-hand" id="opp-top-hand" aria-label="Opponent top hand">
      </div>
    </div>

    <div class="opponent-zone zone-left" id="zone-left">
      <div class="opponent-info" id="opp-left-info">
        <div class="opp-avatar" id="opp-left-avatar">?</div>
        <span class="opp-name" id="opp-left-name">—</span>
        <span class="opp-card-count" id="opp-left-count">
          <span class="card-icon">🂠</span><span id="opp-left-n">0</span>
        </span>
      </div>
      <div class="opp-hand opp-hand--vertical" id="opp-left-hand" aria-label="Opponent left hand">
      </div>
    </div>

    <div class="center-zone" id="center-zone">

      <div class="color-picker" id="color-picker" hidden aria-modal="true" role="dialog" aria-label="Choose a colour">
        <p class="color-picker-title">Choose a colour</p>
        <div class="color-swatches">
          <button class="swatch swatch--red"    data-color="red"   >R</button>
          <button class="swatch swatch--yellow" data-color="yellow">Y</button>
          <button class="swatch swatch--green"  data-color="green" >G</button>
          <button class="swatch swatch--blue"   data-color="blue"  >B</button>
        </div>
      </div>

      <div class="pile draw-pile" id="draw-pile" role="button" tabindex="0" aria-label="Draw a card">
        <div class="card card--back">
          <span class="card-label">Draw</span>
        </div>
        <span class="pile-legend">Draw pile</span>
      </div>

      <div class="pile discard-pile" id="discard-pile" aria-live="polite" aria-label="Discard pile">
        <div class="card card--placeholder" id="top-card">
          <span class="card-value" id="top-card-value">—</span>
        </div>
        <span class="pile-legend">Discard pile</span>
      </div>

    </div>

    <div class="opponent-zone zone-right" id="zone-right">
      <div class="opponent-info" id="opp-right-info">
        <div class="opp-avatar" id="opp-right-avatar">?</div>
        <span class="opp-name" id="opp-right-name">—</span>
        <span class="opp-card-count" id="opp-right-count">
          <span class="card-icon">🂠</span><span id="opp-right-n">0</span>
        </span>
      </div>
      <div class="opp-hand opp-hand--vertical" id="opp-right-hand" aria-label="Opponent right hand">
      </div>
    </div>

    <div class="player-zone zone-bottom" id="zone-bottom">
      <div class="player-self-info">
        <div class="self-avatar" id="self-avatar">ME</div>
        <span class="self-name" id="self-name">You</span>
      </div>

      <button class="btn-uno" id="btn-uno" disabled aria-label="Declare UNO!">
        UNO!
      </button>

      <div class="hand-scroller" id="hand-scroller" role="list" aria-label="Your hand">
      </div>
    </div>

  </div>

  <div class="overlay-screen" id="gameover-screen" hidden>
    <div class="overlay-card">
      <img src="assets/logo_game/UNO_Logo.svg.png" alt="UNO" class="overlay-logo-lg"/>
      <h2 class="overlay-title" id="gameover-title">Game Over</h2>
      <p class="overlay-subtitle" id="gameover-subtitle">—</p>
      <div class="scores-list" id="scores-list"></div>
      <button class="btn-primary" id="btn-play-again">Play Again</button>
      <button class="btn-ghost" id="btn-back-lobby">Back to Lobby</button>
    </div>
  </div>

  <div class="toast-container" id="toast-container" aria-live="assertive"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="scripts/game.js"></script>
</body>
</html>
