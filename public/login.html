<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNO — Login</title>
  <link rel="shortcut icon" href="assets/logo_game/UNO_Logo.svg.png" type="image/png"/>
  <link rel="stylesheet" href="styles/main.css"/>
</head>
<body>
 
  <div class="container" id="container">
 
    <div class="form-container sign-up-container">
      <form id="signup-form" novalidate>
        <h1>Create Account</h1>

        <div class="avatar-upload">
          <label for="pp-input" class="avatar-label" title="Add your profile">
            <img
              src="assets/logo_game/user_log.png"
              alt="Profile picture"
              class="avatar-preview"
              id="pp-preview"
            />
            <div class="avatar-overlay"><span>📷</span></div>
          </label>
          <input type="file" id="pp-input" accept="image/*" style="display:none;" />
          <p class="avatar-hint">Click to add your photo</p>
        </div>
 
        <div class="input-group">
          <input
            type="text"
            id="su-username"
            placeholder="Username"
            minlength="3"
            maxlength="20"
            autocomplete="off"
            required
          />
          <span class="field-error" id="su-username-err"></span>
        </div>
 
        <div class="input-group">
          <div class="password-wrapper">
            <input
              type="password"
              id="su-password"
              placeholder="Password"
              required
            />
            <button type="button" class="toggle-pw" data-target="su-password">👁</button>
          </div>
          <div class="strength-bar-track"><div class="strength-bar" id="strength-bar"></div></div>
          <span class="strength-label" id="strength-label"></span>
          <span class="field-error" id="su-password-err"></span>
        </div>
 
        <button type="submit" class="btn-primary">Sign Up</button>
      </form>
    </div>
 
    <div class="form-container sign-in-container">
      <form id="signin-form" novalidate>
        <h1>Sign In</h1>
 
        <div class="avatar-display">
          <img src="assets/logo_game/user_log.png" alt="Avatar" class="avatar-preview" />
        </div>
 
        <div class="input-group">
          <input
            type="text"
            id="si-username"
            placeholder="Username"
            autocomplete="off"
            required
          />
          <span class="field-error" id="si-username-err"></span>
        </div>
 
        <div class="input-group">
          <div class="password-wrapper">
            <input
              type="password"
              id="si-password"
              placeholder="Password"
              required
            />
            <button type="button" class="toggle-pw" data-target="si-password">👁</button>
          </div>
          <span class="field-error" id="si-password-err"></span>
        </div>
 
        <a href="#" class="forgot-link">Forgot your password?</a>
        <button type="submit" class="btn-primary">Sign In</button>
      </form>
    </div>
 
    <div class="overlay-container">
      <div class="overlay">
 
        <div class="overlay-panel overlay-left">
          <img src="assets/logo_game/UNO_Logo.svg.png" alt="UNO" class="overlay-logo"/>
          <h1>Welcome Back!</h1>
          <p>Already have an account?<br/>Sign in and join the game!</p>
          <button class="btn-ghost" id="signIn">Sign In</button>
        </div>
 
        <div class="overlay-panel overlay-right">
          <img src="assets/logo_game/UNO_Logo.svg.png" alt="UNO" class="overlay-logo"/>
          <h1>Hello, Player!</h1>
          <p>Don't have an account yet?<br/>Create one and start playing!</p>
          <button class="btn-ghost" id="signUp">Sign Up</button>
        </div>
 
      </div>
    </div>
 
  </div>
 
  <script src="scripts/login.js"></script>
</body>
</html>
