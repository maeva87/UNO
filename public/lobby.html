<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UNO — Lobby</title>
  <link rel="shortcut icon" href="assets/logo_game/UNO_Logo.svg.png" type="image/png"/>
  <link rel="stylesheet" href="styles/main.css"/>
  <link rel="stylesheet" href="styles/lobby.css"/>
</head>
<body>

  <header class="lobby-header">
    <img src="assets/logo_game/UNO_Logo.svg.png" alt="UNO" class="lobby-logo"/>
    <div class="lobby-user-info">
      <span class="lobby-username" id="header-username">Player</span>
      <button class="btn-logout" id="btn-logout">Log out</button>
    </div>
  </header>

  <main class="lobby-main">

    <section class="panel panel-actions" aria-label="Create or join a room">

      <div class="action-card" id="card-create">
        <h2 class="action-title">Create a Room</h2>
        <div class="input-group">
          <input
            type="text"
            id="room-name"
            placeholder="Room name"
            maxlength="24"
            autocomplete="off"
          />
          <span class="field-error" id="room-name-err"></span>
        </div>
        <div class="input-group">
          <label class="select-label" for="max-players">Max players</label>
          <select id="max-players" class="lobby-select">
            <option value="2">2 players</option>
            <option value="3">3 players</option>
            <option value="4" selected>4 players</option>
          </select>
        </div>
        <button class="btn-primary" id="btn-create">Create Room</button>
      </div>

      <div class="divider"><span>or</span></div>
      <div class="action-card" id="card-join">
        <h2 class="action-title">Join a Room</h2>
        <div class="input-group">
          <input
            type="text"
            id="join-code"
            placeholder="Room code (e.g. AB12CD)"
            maxlength="6"
            autocomplete="off"
            style="text-transform:uppercase; letter-spacing:4px;"
          />
          <span class="field-error" id="join-code-err"></span>
        </div>
        <button class="btn-primary btn-blue" id="btn-join">Join Room</button>
      </div>

    </section>
    <section class="panel panel-lobby" id="panel-lobby" aria-label="Current lobby" hidden>

      <div class="room-banner">
        <div class="room-info-block">
          <span class="room-label">Room</span>
          <span class="room-name-display" id="room-name-display">—</span>
        </div>
        <div class="room-info-block">
          <span class="room-label">Code</span>
          <div class="code-wrapper">
            <span class="room-code" id="room-code-display">——————</span>
            <button class="btn-copy" id="btn-copy-code" title="Copy code">⎘</button>
          </div>
        </div>
        <div class="room-info-block">
          <span class="room-label">Players</span>
          <span class="room-count" id="room-count">0 / 4</span>
        </div>
      </div>

      <div class="player-list-wrap">
        <h3 class="section-title">Players in lobby</h3>
        <ul class="player-list" id="player-list" aria-live="polite">
        </ul>
      </div>

      <div class="lobby-chat-wrap">
        <h3 class="section-title">Chat</h3>
        <div class="chat-messages" id="chat-messages" aria-live="polite"></div>
        <div class="chat-input-row">
          <input
            type="text"
            id="chat-input"
            placeholder="Say something..."
            maxlength="120"
            autocomplete="off"
          />
          <button class="btn-send" id="btn-send-chat">➤</button>
        </div>
      </div>

      <div class="lobby-footer">
        <button class="btn-leave" id="btn-leave">← Leave</button>
        <button class="btn-start" id="btn-start" hidden>
          Start Game 🃏
        </button>
        <span class="waiting-msg" id="waiting-msg">Waiting for the host…</span>
      </div>

    </section>

  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="scripts/lobby.js"></script>
</body>
</html>
