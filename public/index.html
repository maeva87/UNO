<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO — Jeu Multijoueur</title>
    <link rel="shortcut icon" href="assets/logo_game/UNO_Logo.svg.png" type="image/png"/>
    <link rel="stylesheet" href="styles/main.css"/>
  </head>
  <body class="home-page">
    <div style="text-align: center; animation: float 3.2s ease-in-out infinite;">
      <img src="assets/logo_game/UNO_Logo.svg.png" alt="UNO" width="300" />
      <h1 style="color: var(--white); font-family: 'Lilita One', cursive; font-size: 2.5rem; margin: 20px 0; text-shadow: 0 4px 16px rgba(0,0,0,.4);">UNO Web</h1>
      <p style="color: rgba(255,255,255,.8); font-size: 1.1rem; margin-bottom: 30px;">Jouez en ligne avec vos amis!</p>
      <a href="login.html" style="display: inline-block; text-decoration: none;">
        <button class="btn btn-primary" style="padding: 15px 50px; font-size: 1.2rem;">
          🚀 Commencer
        </button>
      </a>
    </div>
    <script>
      // Easter egg: toucher le logo pour une surprise!
      document.querySelector('img[alt="UNO"]').addEventListener('click', function() {
        this.style.animation = 'spin .6s ease-in-out';
        setTimeout(() => { this.style.animation = 'float 3.2s ease-in-out infinite'; }, 600);
      });
    </script>
    <style>
      @keyframes spin {
        0% { transform: rotate(0deg) scale(1); }
        50% { transform: rotate(180deg) scale(1.1); }
        100% { transform: rotate(360deg) scale(1); }
      }
    </style>
  </body>
</html>
